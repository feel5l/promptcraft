kind = "web"
previewPath = "/"
title = "PromptCraft"
version = "1.0.0"
id = "artifacts/promptcraft"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23870

[services.development]
run = "pnpm --filter @workspace/promptcraft run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/promptcraft", "run", "build" ]
publicDir = "artifacts/promptcraft/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23870"
BASE_PATH = "/"
